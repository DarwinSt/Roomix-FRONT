<div class="dialog-accent" aria-hidden="true"></div>

<div mat-dialog-title class="dialog-header">
  <div class="header-icon">
    <mat-icon>person_add</mat-icon>
  </div>
  <div class="header-text">
    <h2>Registrar huésped</h2>
    <p>Datos mínimos para asignar una reserva o estadía.</p>
  </div>
</div>

<mat-dialog-content>
  <form [formGroup]="form" class="dialog-form-grid">
    <mat-form-field appearance="outline" class="full">
      <mat-label>Nombre</mat-label>
      <input matInput formControlName="nombre" autocomplete="given-name" />
    </mat-form-field>
    <mat-form-field appearance="outline" class="full">
      <mat-label>Apellidos</mat-label>
      <input matInput formControlName="apellidos" autocomplete="family-name" />
    </mat-form-field>

    <p class="section-label full">Documento</p>
    <mat-form-field appearance="outline" class="roomix-dialog-select">
      <mat-label>Tipo</mat-label>
      <mat-select panelClass="roomix-select-panel" formControlName="tipoDocumento">
        @for (t of tiposDocumento; track t.value) {
          <mat-option [value]="t.value">{{ t.label }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Número</mat-label>
      <input matInput formControlName="numeroDocumento" />
    </mat-form-field>

    <p class="section-label full">Contacto</p>
    <mat-form-field appearance="outline" class="full">
      <mat-label>Email</mat-label>
      <mat-icon matPrefix>mail</mat-icon>
      <input matInput type="email" formControlName="email" autocomplete="email" />
    </mat-form-field>
    <mat-form-field appearance="outline" class="full">
      <mat-label>Teléfono</mat-label>
      <mat-icon matPrefix>phone</mat-icon>
      <input matInput formControlName="telefono" autocomplete="tel" />
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close type="button">Cancelar</button>
  <button
    mat-flat-button
    color="primary"
    type="button"
    [disabled]="form.invalid || guardando()"
    (click)="guardar()"
  >
    @if (guardando()) {
      <mat-spinner diameter="18" />
    } @else {
      Registrar huésped
    }
  </button>
</mat-dialog-actions>
